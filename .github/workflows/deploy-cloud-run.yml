name: Deploy to Cloud Run (google-hackathon-2026)

on:
  push:
    branches: [google-hackathon-2026]
  workflow_dispatch:

env:
  PROJECT_ID: project-7743396c-e1bc-40ff-a7e
  SERVICE_NAME: tichlabs-tracker-preview
  REGION: us-central1
  ARTIFACT_REGISTRY_REPO: tichlabs-tracker
  IMAGE: us-central1-docker.pkg.dev/project-7743396c-e1bc-40ff-a7e/tichlabs-tracker/tichlabs-tracker-preview

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build frontend/ \
            --build-arg VITE_SUPABASE_URL="${{ secrets.VITE_SUPABASE_URL }}" \
            --build-arg VITE_SUPABASE_ANON_KEY="${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            --build-arg VITE_MCP_SERVER_URL="${{ secrets.VITE_MCP_SERVER_URL }}" \
            --build-arg VITE_MCP_API_KEY="${{ secrets.VITE_MCP_API_KEY }}" \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest

      - name: Push to Artifact Registry
        run: docker push ${{ env.IMAGE }} --all-tags

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --allow-unauthenticated \
            --memory 256Mi \
            --min-instances 0 \
            --max-instances 2 \
            --cpu 1 \
            --concurrency 80

      - name: Show URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --format='value(status.url)')
          echo "### ✅ Deployed to Cloud Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[$URL]($URL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\` · Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
